<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Personal Compass - PC & Profit</title>
    <style>
        :root { --main-bg: #1a1b26; --text: #a9b1d6; --accent: #7aa2f7; --warn: #f7768e; --success: #9ece6a; }
        body { background: var(--main-bg); color: var(--text); font-family: 'Courier New', monospace; padding: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; border: 1px solid var(--accent); padding: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(122, 162, 247, 0.2); }
        h1 { color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 10px; font-size: 1.5rem; }
        textarea { width: 100%; height: 150px; background: #24283b; color: var(--success); border: 1px solid #414868; padding: 10px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: var(--accent); color: var(--main-bg); border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; width: 100%; border-radius: 4px; }
        .card { background: #24283b; padding: 15px; margin-top: 20px; border-left: 4px solid var(--accent); }
        .highlight { color: var(--success); font-weight: bold; }
        .action-item { border-bottom: 1px dashed #414868; padding: 8px 0; display: flex; justify-content: space-between; }
        .category { font-weight: bold; color: var(--accent); min-width: 100px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 2026 PC Strategy & Action</h1>
        <p>Neofetchの結果を入力して、今日の行動指針を生成：</p>
        <textarea id="input" placeholder="NixOS $ neofetch ..."></textarea>
        <button onclick="updateStrategy()">Update My Strategy</button>

        <div id="dashboard" style="display:none;">
            <div class="card">
                <div class="action-item"><span class="category">💰 収益化:</span> <span id="affiliateTask" class="highlight"></span></div>
                <div class="action-item"><span class="category">🧹 整理:</span> <span id="cleanupTask"></span></div>
                <div class="action-item"><span class="category">🧘 習慣:</span> <span id="lifeTask"></span></div>
            </div>
            <div class="card" style="border-left-color: var(--warn);">
                <div class="action-item"><span>推定月間電気代:</span> <span id="powerCost"></span></div>
                <div class="action-item"><span>システム状態:</span> <span id="sysStatus"></span></div>
            </div>
        </div>
    </div>

    <script>
        function updateStrategy() {
            const raw = document.getElementById('input').value;
            const ram = parseInt(raw.match(/Memory: .* \/ (\d+)MiB/)?.[1]) || 0;
            const uptime = raw.match(/Uptime: (.*)/)?.[1] || "";
            const gpu = raw.includes("NVIDIA") || raw.includes("Radeon");

            // 1. 収益化ロジック
            let aff = "リサーチと記事構成作成";
            if (ram > 16000) aff = "高負荷作業（画像生成・複数垢同時運用）";
            if (gpu) aff += " ＋ AI素材の生成";

            // 2. 整理ロジック
            let clean = "このPCは現役続行。周辺の書類を1枚捨てよう。";
            if (ram < 4000) clean = "【断捨離対象】データを抜いて売却・譲渡を検討！";

            // 3. ライフスタイルロジック
            let life = "良い姿勢で作業しましょう。";
            if (uptime.includes("days")) life = "PCもあなたも働きすぎです。今すぐ再起動して休憩を。";

            // 4. 電気代（概算）
            let cost = (ram > 16000) ? "約1,800円/月" : "約800円/月";

            document.getElementById('affiliateTask').innerText = aff;
            document.getElementById('cleanupTask').innerText = clean;
            document.getElementById('lifeTask').innerText = life;
            document.getElementById('powerCost').innerText = cost;
            document.getElementById('sysStatus').innerText = "✅ Analysis Complete";
            document.getElementById('dashboard').style.display = 'block';
        }
    </script>
</body>
</html>
