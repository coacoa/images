<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockTube JSON Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--s1:#111114;--s2:#18181c;--s3:#222228;--s4:#2c2c34;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);--bd3:rgba(255,255,255,0.2);
  --t1:#f0f0f4;--t2:#9898a8;--t3:#55555f;
  --violet:#8b7cf8;--violet2:#a99bff;--violet-bg:rgba(139,124,248,0.12);
  --cyan:#2dd4bf;--cyan-bg:rgba(45,212,191,0.1);
  --green:#4ade80;--green-bg:rgba(74,222,128,0.1);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1);
  --red:#f87171;--red-bg:rgba(248,113,113,0.1);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,0.1);
  --r:8px;--r2:12px;--r3:16px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;flex-direction:column;font-size:14px}

/* ===== HEADER ===== */
header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;letter-spacing:-.3px;white-space:nowrap}
.logo-mark{width:28px;height:28px;background:var(--violet);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.logo-sub{color:var(--t3);font-weight:400;font-size:12px;padding:2px 8px;background:var(--s3);border-radius:5px;border:1px solid var(--bd)}
.hactions{display:flex;gap:8px;flex-shrink:0}

/* ===== BUTTONS ===== */
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:500;padding:6px 12px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--s2);color:var(--t1);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--s3);border-color:var(--bd3)}
.btn:active{transform:scale(.97)}
.btn.pri{background:var(--violet);border-color:var(--violet);color:#fff}
.btn.pri:hover{background:var(--violet2);border-color:var(--violet2)}
.btn.suc{background:var(--green-bg);border-color:rgba(74,222,128,.25);color:var(--green)}
.btn.suc:hover{background:rgba(74,222,128,.18)}
.btn.dan{background:var(--red-bg);border-color:rgba(248,113,113,.25);color:var(--red)}
.btn.dan:hover{background:rgba(248,113,113,.18)}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ===== LAYOUT ===== */
.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}

/* ===== SIDEBAR ===== */
.sidebar{width:220px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:12px 14px 8px;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;flex-shrink:0}
.file-list{flex:1;overflow-y:auto;padding:4px 8px}
.fitem{padding:8px 10px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .1s;border:1px solid transparent}
.fitem:hover{background:var(--s2)}
.fitem.act{background:var(--violet-bg);border-color:rgba(139,124,248,.2)}
.fitem.act .fn{color:var(--violet2)}
.fn{font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:3px;color:var(--t1)}
.fm{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.no-files{padding:24px 12px;text-align:center;color:var(--t3);font-size:12px;line-height:1.7}
.sb-foot{padding:8px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px;flex-shrink:0}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px}
.empty-ico{width:64px;height:64px;background:var(--s2);border-radius:14px;border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-size:28px}
.empty h2{font-size:20px;font-weight:600}
.empty p{color:var(--t2);font-size:13px;text-align:center;line-height:1.6;max-width:300px}
.eact{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}

/* editor */
.editor{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* toolbar */
.tbar{padding:8px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;background:var(--s1);flex-wrap:wrap;flex-shrink:0}
.tbar-name{font-size:13px;font-weight:500;color:var(--t1);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsep{width:1px;height:16px;background:var(--bd2);flex-shrink:0}
.tsp{flex:1}

/* stats */
.sbar{padding:6px 16px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;gap:16px;flex-wrap:wrap;flex-shrink:0}
.sc{display:flex;align-items:center;gap:5px;font-size:11px}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.slb{color:var(--t2)}
.sv{font-weight:500;font-family:'JetBrains Mono',monospace;font-size:11px}

/* tabs */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd);background:var(--s1);flex-shrink:0}
.tab{font-size:12px;font-weight:500;padding:9px 14px;border:none;background:none;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif}
.tab:hover{color:var(--t1)}
.tab.act{color:var(--violet2);border-bottom-color:var(--violet)}
.tc{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--s3);color:var(--t3);font-weight:600}
.tab.act .tc{background:var(--violet-bg);color:var(--violet2)}

/* panel */
.panel{flex:1;overflow-y:auto;padding:16px;display:none}
.panel.act{display:block}

/* section */
.sech{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.seca{display:flex;align-items:center;gap:6px}
.cnt-badge{font-size:11px;padding:2px 8px;border-radius:5px;background:var(--s3);color:var(--t2);font-weight:500}

/* search */
.sbox{flex:1;max-width:280px;display:flex;align-items:center;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);padding:0 8px;gap:6px}
.sbox svg{width:12px;height:12px;color:var(--t3);flex-shrink:0}
.sbox input{flex:1;background:none;border:none;outline:none;color:var(--t1);font-size:12px;padding:6px 0;font-family:'Inter',sans-serif}
.sbox input::placeholder{color:var(--t3)}

/* ===== ENTRY CARDS ===== */
.elist{display:flex;flex-direction:column;gap:2px}

/* channel card — rich display */
.ecard{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);transition:all .12s;position:relative}
.ecard:hover{border-color:var(--bd2);background:var(--s2)}
.ecard.cmt{opacity:.5}
.ecard.cmt:hover{opacity:.75}

/* avatar */
.ava{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;font-family:'JetBrains Mono',monospace;overflow:hidden;position:relative}
.ava.has-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ava.no-img{background:var(--s3);border:1px solid var(--bd2)}

/* card body */
.ecbody{flex:1;min-width:0}
.ecname{font-size:13px;font-weight:500;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.3}
.ecid{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;line-height:1.4}
.ecid a{color:var(--blue);text-decoration:none}
.ecid a:hover{text-decoration:underline}
.ecmeta{display:flex;align-items:center;gap:6px;margin-top:3px}

/* type badge */
.tbadge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.tb-channelId{background:var(--violet-bg);color:var(--violet2)}
.tb-channelName{background:var(--cyan-bg);color:var(--cyan)}
.tb-videoId{background:var(--green-bg);color:var(--green)}
.tb-videoTitle{background:var(--amber-bg);color:var(--amber)}
.tb-commentUser,.tb-commentContent{background:var(--red-bg);color:var(--red)}
.tb-comment{background:var(--s3);color:var(--t3)}
.tb-regex{background:rgba(139,124,248,.15);color:var(--violet2);font-size:9px}

/* card actions */
.cactions{display:flex;gap:4px;opacity:0;transition:opacity .1s;flex-shrink:0}
.ecard:hover .cactions{opacity:1}
.ico-btn{width:26px;height:26px;border:none;background:none;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--t3);transition:all .12s}
.ico-btn:hover.del{background:var(--red-bg);color:var(--red)}
.ico-btn:hover.edit{background:var(--violet-bg);color:var(--violet2)}
.ico-btn:hover.link{background:var(--blue-bg);color:var(--blue)}
.ico-btn svg{width:13px;height:13px}

/* inline edit */
.ecard.editing .ecname{display:none}
.einput{display:none;flex:1;background:var(--s3);border:1px solid var(--violet);border-radius:5px;padding:3px 7px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
.ecard.editing .einput{display:block}
.ecard.editing .cactions{opacity:1}

/* add row */
.addrow{display:flex;gap:8px;margin-top:10px}
.addinput{flex:1;background:var(--s1);border:1px dashed var(--bd2);border-radius:var(--r);padding:7px 10px;color:var(--t1);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border .12s}
.addinput:focus{border-color:var(--violet);border-style:solid}
.addinput::placeholder{color:var(--t3)}

/* ===== JS PANEL ===== */
.jspanel{flex:1;overflow:hidden;display:none;flex-direction:column;padding:16px}
.jspanel.act{display:flex}
.jswrap{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;display:flex;flex-direction:column}
.jshead{padding:8px 12px;border-bottom:1px solid var(--bd);font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;align-items:center}
.jsta{flex:1;background:none;border:none;outline:none;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;padding:12px;resize:none;tab-size:2}

/* ===== MERGE PANEL ===== */
.mpanel{flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:16px}
.mpanel.act{display:flex}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.mcard.cur{border-color:var(--violet)}
.mch{padding:10px 12px;border-bottom:1px solid var(--bd);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:space-between}
.mcard.cur .mch{background:var(--violet-bg);color:var(--violet2)}
.mstats{padding:10px 12px;display:flex;flex-direction:column;gap:4px}
.msr{display:flex;justify-content:space-between;font-size:11px}
.msr .lb{color:var(--t2)}
.msr .v{font-family:'JetBrains Mono',monospace;font-weight:500}
.mopts{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);padding:14px}
.mopts h3{font-size:13px;font-weight:500;margin-bottom:10px}
.rgrp{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.ritem{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all .12s}
.ritem:hover{border-color:var(--bd2);background:var(--s2)}
.ritem input{margin-top:2px;accent-color:var(--violet);flex-shrink:0}
.rtext{font-size:12px}
.rdesc{font-size:11px;color:var(--t2);margin-top:2px}
.ritem.sel{border-color:rgba(139,124,248,.3);background:var(--violet-bg)}

/* ===== JSON PANEL ===== */
.jpanel{flex:1;overflow:hidden;display:none;flex-direction:column}
.jpanel.act{display:flex}
.jpre{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:var(--r2);margin:16px;overflow:auto;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--t2);white-space:pre}
.jptbar{padding:8px 16px;border-bottom:1px solid var(--bd);display:flex;gap:8px;background:var(--s1);flex-shrink:0}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;right:20px;background:var(--s3);border:1px solid var(--bd2);border-radius:var(--r);padding:9px 14px;font-size:12px;font-weight:500;color:var(--t1);z-index:9999;transform:translateY(80px);opacity:0;transition:all .2s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:7px;max-width:280px}
.toast.show{transform:translateY(0);opacity:1}
.toast.g{border-left:3px solid var(--green)}
.toast.r{border-left:3px solid var(--red)}
.toast.b{border-left:3px solid var(--violet)}

/* ===== LOADING SKELETON ===== */
.skel{animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
.skel-line{height:10px;background:var(--s3);border-radius:4px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
.hidden{display:none!important}

/* color hash for avatars */
.avc0{background:#7c3aed22;color:#a78bfa}
.avc1{background:#0e7490;color:#67e8f9} /* actually border-radius issue */
.avc2{background:#065f4622;color:#34d399}
.avc3{background:#92400e22;color:#fbbf24}
.avc4{background:#7f1d1d22;color:#fca5a5}
.avc5{background:#1e3a5f22;color:#93c5fd}
.avc6{background:#4a044e22;color:#e879f9}
.avc7{background:#14532d22;color:#86efac}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">🚫</div>
    BlockTube Editor
    <span class="logo-sub">JSON ビジュアルエディター</span>
  </div>
  <div class="hactions">
    <button class="btn" id="importBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      JSONを読み込む
    </button>
    <button class="btn" id="dedupAllBtn" disabled onclick="dedupAll()" title="全カテゴリの重複エントリをまとめて削除">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3"/><path d="M21 8V5a2 2 0 00-2-2h-3"/><path d="M3 16v3a2 2 0 002 2h3"/><path d="M16 21h3a2 2 0 002-2v-3"/></svg>
      重複削除
    </button>
    <button class="btn suc" id="exportBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 14 12 9 7 14"/><line x1="12" y1="9" x2="12" y2="21"/></svg>
      エクスポート
    </button>
  </div>
  <input type="file" id="fileInput" accept=".json" multiple style="display:none">
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sb-head">ファイル</div>
    <div class="file-list" id="fileList">
      <div class="no-files">JSONを読み込むか<br>ドロップしてください</div>
    </div>
    <div class="sb-foot">
      <button class="btn" id="mergeBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        マージ
      </button>
      <button class="btn dan" id="clearAllBtn">全て削除</button>
    </div>
  </aside>

  <main class="main" id="mainArea">
    <div class="empty" id="emptyState">
      <div class="empty-ico">📂</div>
      <h2>ファイルを読み込む</h2>
      <p>BlockTubeのJSONをドラッグ＆ドロップ、または選択して読み込んでください。複数ファイルのマージも可能です。</p>
      <div class="eact">
        <button class="btn pri" onclick="document.getElementById('fileInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          JSONを選択
        </button>
        <button class="btn" onclick="loadSample()">サンプルを試す</button>
      </div>
    </div>

    <div class="editor hidden" id="editorArea">
      <div class="tbar">
        <span class="tbar-name" id="edFname">—</span>
        <div class="tsep"></div>
        <button class="btn" id="addBtn" onclick="focusAddInput()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          追加
        </button>
        <div class="tsp"></div>
        <button class="btn dan" id="delFileBtn">このファイルを削除</button>
      </div>
      <div class="sbar" id="statsBar"></div>
      <div class="tabs" id="tabNav"></div>
      <div id="panelWrap" style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0"></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const FILTERS=[
  {key:'channelId',   label:'チャンネルID',    ph:'UCxxxxxxxxxxxxxxxxxx',    color:'#8b7cf8'},
  {key:'channelName', label:'チャンネル名',    ph:'チャンネル名キーワード',    color:'#2dd4bf'},
  {key:'videoId',     label:'動画ID',          ph:'xxxxxxxxxxx',             color:'#4ade80'},
  {key:'title',       label:'動画タイトル',    ph:'タイトルキーワード',         color:'#fbbf24'},
  {key:'comment',     label:'コメント',        ph:'ユーザー名またはキーワード', color:'#f87171'},
];

let files=[], activeIdx=-1, activeTab='channelId';
// channel info cache: {channelId: {name, avatar, loaded}}
let chCache={};

const $ = id => document.getElementById(id);

/* ======= COLOR HASH ======= */
function colorHash(str){
  let h=0;for(let c of str)h=(h*31+c.charCodeAt(0))>>>0;
  return h%8;
}
function initials(str){
  if(!str)return '?';
  const clean=str.replace(/^UC/,'');
  return clean.slice(0,2).toUpperCase();
}

/* ======= AVATAR ======= */
function makeAvatar(key, val, size=34){
  if(val.trim().startsWith('//')||val.trim()==='') return `<div class="ava no-img" style="width:${size}px;height:${size}px">💬</div>`;
  const isRegex = val.startsWith('/') && val.endsWith('/');
  const isChId = /^UC[\w-]{22}$/.test(val.trim());
  const isChName = key==='channelName';
  const isVid = key==='videoId'||key==='title';

  if(isChId||isChName){
    const ci=colorHash(val);
    // try cached
    if(isChId && chCache[val] && chCache[val].avatar){
      return `<div class="ava has-img" style="width:${size}px;height:${size}px"><img src="${chCache[val].avatar}" onerror="this.parentElement.className='ava no-img avc${ci}';this.remove();this.parentElement.innerHTML='${initials(val)}'"></div>`;
    }
    const ini=isChId?initials(val):(val.slice(0,2).toUpperCase());
    return `<div class="ava no-img avc${ci}" style="width:${size}px;height:${size}px">${ini}</div>`;
  }
  if(isVid){
    const ci=colorHash(val);
    if(/^[\w-]{11}$/.test(val.trim())){
      return `<div class="ava has-img" style="width:${size}px;height:${size}px"><img src="https://i.ytimg.com/vi/${val.trim()}/default.jpg" style="object-fit:cover;width:100%;height:100%;border-radius:50%" onerror="this.parentElement.className='ava no-img avc${ci}';this.remove();this.parentElement.innerHTML='🎬'"></div>`;
    }
    return `<div class="ava no-img avc${ci}" style="width:${size}px;height:${size}px">🎬</div>`;
  }
  const ci=colorHash(val);
  const icons={comment:'💬'};
  return `<div class="ava no-img avc${ci}" style="width:${size}px;height:${size}px">${icons[key]||'🔤'}</div>`;
}

/* ======= DISPLAY NAME & LINK ======= */
function entryDisplay(key, val){
  if(val.trim().startsWith('//')||val.trim()==='') return {name: val||'（空行）', sub:null, link:null};
  const isChId=/^UC[\w-]{22}$/.test(val.trim());
  let name=val, sub=null, link=null;
  const isRegex=val.startsWith('/')&&val.endsWith('/');

  if(isChId){
    // use cached name if available
    if(chCache[val]&&chCache[val].name) name=chCache[val].name;
    else name=val;
    sub=val;
    link=`https://www.youtube.com/channel/${val}`;
  } else if(key==='videoId'&&/^[\w-]{11}$/.test(val.trim())){
    link=`https://www.youtube.com/watch?v=${val}`;
    sub=val;
    name='動画ID: '+val;
  } else if(key==='channelId'||key==='channelName'){
    link=null;
  }
  return {name, sub, link, isRegex};
}

/* ======= FETCH CHANNEL NAME via oEmbed ======= */
async function fetchChannelInfo(channelId){
  if(chCache[channelId]) return chCache[channelId];
  chCache[channelId]={name:channelId, avatar:null, loading:true};
  try{
    // Use a video search via noembed to get channel name — use oEmbed trick: actually we just show ID nicely
    // Real approach: YouTube oEmbed doesn't work for channels. So we use a proxy-free trick:
    // Load https://www.youtube.com/channel/UC... page and extract og:title via a CORS proxy.
    // Without CORS proxy we cannot. We'll use a public one: allorigins.win
    const url=`https://api.allorigins.win/raw?url=${encodeURIComponent('https://www.youtube.com/channel/'+channelId+'?hl=ja')}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
    if(!r.ok)throw new Error();
    const html=await r.text();
    // extract title
    const tm=html.match(/<meta property="og:title" content="([^"]+)"/);
    const im=html.match(/<meta property="og:image" content="([^"]+)"/);
    const name=tm?tm[1].replace(' - YouTube',''):channelId;
    const avatar=im?im[1]:null;
    chCache[channelId]={name, avatar, loading:false};
    return chCache[channelId];
  }catch(e){
    chCache[channelId]={name:channelId, avatar:null, loading:false};
    return chCache[channelId];
  }
}

/* ======= LOAD CHANNEL INFO BATCH ======= */
async function loadChannelInfoForFile(f){
  const ids=(f.data.channelId||[]).filter(v=>v.trim()&&!v.trim().startsWith('/')&&/^UC[\w-]{22}$/.test(v.trim()));
  const unloaded=ids.filter(id=>!chCache[id]);
  if(!unloaded.length)return;
  // Load in batches of 5 concurrently
  const batch=5;
  for(let i=0;i<unloaded.length;i+=batch){
    const group=unloaded.slice(i,i+batch);
    await Promise.all(group.map(async id=>{
      const info=await fetchChannelInfo(id);
      // re-render if still on this file
      if(activeIdx>=0&&files[activeIdx]===f&&activeTab==='channelId'){
        const el=document.querySelector(`[data-id="${CSS.escape(id)}"]`);
        if(el){
          const ni=el.querySelector('.ecname');
          const si=el.querySelector('.ecid span.idtext');
          const av=el.querySelector('.ava');
          if(ni&&info.name)ni.textContent=info.name;
          if(av&&info.avatar){
            av.outerHTML=`<div class="ava has-img" style="width:34px;height:34px"><img src="${info.avatar}" onerror="this.parentElement.className='ava no-img';this.remove()"></div>`;
          }
        }
      }
    }));
  }
}

/* ======= NORMALIZE ======= */
function norm(data){
  const o={};
  FILTERS.forEach(({key})=>{ o[key]=Array.isArray(data[key])?[...data[key]]:[] });
  o.javascript=data.javascript||'';
  // BlockTube固有フィールドをそのまま保持
  o.vidLength=data.vidLength||[null,null];
  o.percentWatchedHide=data.percentWatchedHide??null;
  return o;
}
function countReal(arr){ return (arr||[]).filter(v=>v!=null&&typeof v==='string'&&v.trim()&&!v.trim().startsWith('//')).length; }

      const data=raw.filterData||raw;
      const f={name:file.name, data:norm(data), options:raw.options||{}, uiPass:raw.uiPass||'', uiTheme:raw.uiTheme||'dark', raw};

    }catch(e){ console.error('loadFile error:', e); toast('❌ JSON解析失敗: '+e.message,'r'); }
  };
  r.readAsText(file);
}

};

window.dedupKey=key=>{
  const f=files[activeIdx];
  const arr=f.data[key]||[];
  const seen=new Set();
  let removed=0;
  f.data[key]=arr.filter(v=>{
    const t=v.trim().toLowerCase();
    if(!v.trim()||v.trim().startsWith('//')) return true;
    if(seen.has(t)){removed++;return false;}
    seen.add(t);return true;
  });
  refresh();
  if(!removed) toast('✨ 重複なし','b');
  else toast(`🧹 ${removed}件の重複を削除しました`,'g');
};

window.dedupAll=()=>{
  const f=files[activeIdx];
  if(!f)return;
  let total=0;
  const detail=[];
  FILTERS.forEach(({key,label})=>{
    const arr=f.data[key]||[];
    const seen=new Set();
    let removed=0;
    f.data[key]=arr.filter(v=>{
      const t=v.trim().toLowerCase();
      if(!v.trim()||v.trim().startsWith('//'))return true;
      if(seen.has(t)){removed++;return false;}
      seen.add(t);return true;
    });
    if(removed>0){total+=removed;detail.push(`${label}:${removed}件`);}
  });
  refresh();
  if(total===0) toast('✨ 重複なし — リストはクリーンです','b');
  else toast(`🧹 計${total}件削除 (${detail.join(' / ')})`,'g');
};

  const baseFile=files[activeIdx]||files[0];
  files.forEach(f=>{

        else merged[key].push(v);

    name:'merged_blocktube.json',
    data:merged,
    options:baseFile.options||{},
    uiPass:baseFile.uiPass||'',
    uiTheme:baseFile.uiTheme||'dark',

function buildJson(f){
  const fd={};
  FILTERS.forEach(({key})=>{
    fd[key]=(f.data[key]||[]).filter(v=>{
      const t=v.trim();
      return t!==''&&!t.startsWith('//');
    });
  });
  fd.javascript=f.data.javascript||'';
  fd.vidLength=f.data.vidLength||[null,null];
  fd.percentWatchedHide=f.data.percentWatchedHide??null;
  return JSON.stringify({
    filterData: fd,
    options: f.options||{},
    uiPass: f.uiPass||'',
    uiTheme: f.uiTheme||'dark'
  }, null, 2);
}

/* ======= DELETE FILE ======= */
$('delFileBtn').onclick=()=>{
  if(!confirm('削除しますか？'))return;
  files.splice(activeIdx,1);
  activeIdx=files.length>0?Math.min(activeIdx,files.length-1):-1;
  renderSidebar();
  $('mergeBtn').disabled=files.length<2;
  $('exportBtn').disabled=files.length===0;
  $('dedupAllBtn').disabled=files.length===0;
  if(activeIdx>=0)selectFile(activeIdx);
  else{$('editorArea').classList.add('hidden');$('emptyState').classList.remove('hidden');}
  toast('🗑️ ファイルを削除','b');
};

$('clearAllBtn').onclick=()=>{
  if(!confirm('全ファイルを削除しますか？'))return;
  files=[];activeIdx=-1;
  renderSidebar();
  $('mergeBtn').disabled=true;$('exportBtn').disabled=true;$('dedupAllBtn').disabled=true;
  $('editorArea').classList.add('hidden');$('emptyState').classList.remove('hidden');
};

$('mergeBtn').onclick=()=>{
  if(activeIdx<0)selectFile(0);
  switchTab('merge');
};

/* ======= DRAG & DROP ======= */
document.body.addEventListener('dragover',e=>{e.preventDefault();document.body.style.outline='2px dashed var(--violet)'});
document.body.addEventListener('dragleave',()=>{document.body.style.outline=''});
document.body.addEventListener('drop',e=>{
  e.preventDefault();document.body.style.outline='';
  [...e.dataTransfer.files].filter(f=>f.name.endsWith('.json')).forEach(loadFile);
});

/* ======= HELPERS ======= */
function refresh(){renderStats();renderTabs();renderActivePanel();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,type='b'){
  const el=$('toast');
  el.textContent=msg;el.className=`toast ${type} show`;
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);
}
</script>
